version: 0.2

env:
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Pre build phase

  build:
    commands:
      - echo Build started
      - chmod +x mvnw
      - ./mvnw clean package -DskipTests

  post_build:
    commands:
      - echo Build completed

artifacts:
  files:
    - target/*.jar
    - Procfile

cache:
  paths:
    - /root/.m2/**/*
